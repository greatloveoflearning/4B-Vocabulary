<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 420" width="400" height="420">

  <!-- ground arc -->
  <path d="M 30 402 Q 200 378 370 402" stroke="#7cb342" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- trunk / 中 character, brown -->
  <g fill="#5b3a21">
    <!-- upper stroke, above the box -->
    <rect x="189" y="96" width="22" height="46" rx="8"/>
    <!-- box (口), hollow via evenodd -->
    <path fill-rule="evenodd" d="
      M152 140 L248 140 C256 140 262 146 262 154
      L262 218 C262 226 256 232 248 232
      L152 232 C144 232 138 226 138 218
      L138 154 C138 146 144 140 152 140 Z
      M172 160 L228 160 L228 212 L172 212 Z"/>
    <!-- lower stroke, below the box -->
    <rect x="189" y="232" width="22" height="66" rx="8"/>
    <!-- roots -->
    <path d="M200 296 C192 320 158 336 128 378 C120 389 130 397 141 390
             C168 372 190 344 200 328 Z"/>
    <path d="M200 296 C208 320 242 336 272 378 C280 389 270 397 259 390
             C232 372 210 344 200 328 Z"/>
    <!-- branch-curl flourishes at the top corners, sweeping outward like branches -->
    <path d="M150 138 C110 122 78 100 68 66 C64 52 80 48 86 62
             C98 92 122 110 158 122 Z"/>
    <path d="M250 138 C290 122 322 100 332 66 C336 52 320 48 314 62
             C302 92 278 110 242 122 Z"/>
  </g>

  <!-- stem connecting trunk to canopy -->
  <line x1="200" y1="96" x2="200" y2="80" stroke="#6b9b1e" stroke-width="3"/>

  <!-- molecular canopy (shifted down slightly to overlap the branch tips) -->
  <g transform="translate(0,12)">
  <g stroke="#6b9b1e" stroke-width="2.5" fill="none">
    <line x1="200" y1="60" x2="200" y2="30"/>
    <line x1="200" y1="30" x2="168" y2="14"/>
    <line x1="200" y1="30" x2="232" y2="16"/>
    <line x1="168" y1="14" x2="120" y2="18"/>
