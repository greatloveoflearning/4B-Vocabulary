  <!-- molecular canopy: nodes -->
  <g>
    <circle cx="200" cy="60" r="9" fill="#5c8a26"/>
    <circle cx="200" cy="30" r="8" fill="#5c8a26"/>
    <circle cx="168" cy="14" r="26" fill="#a8c93f"/>
    <circle cx="232" cy="16" r="24" fill="#8bc34a"/>
    <circle cx="120" cy="18" r="14" fill="#bcd35f"/>
    <circle cx="272" cy="10" r="12" fill="#5c8a26"/>
    <circle cx="70" cy="45" r="32" fill="#a8c93f"/>
    <circle cx="312" cy="36" r="19" fill="#8bc34a"/>
    <circle cx="146" cy="58" r="8" fill="#5c8a26"/>
    <circle cx="252" cy="58" r="32" fill="#8bc34a"/>
