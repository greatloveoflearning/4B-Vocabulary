    <line x1="120" y1="18" x2="70" y2="45"/>
    <line x1="146" y1="58" x2="92" y2="68"/>
    <line x1="92" y1="68" x2="46" y2="88"/>
    <line x1="92" y1="68" x2="78" y2="118"/>
    <line x1="78" y1="118" x2="38" y2="150"/>
    <line x1="232" y1="16" x2="272" y2="10"/>
    <line x1="232" y1="16" x2="252" y2="58"/>
    <line x1="272" y1="10" x2="312" y2="36"/>
    <line x1="252" y1="58" x2="304" y2="66"/>
    <line x1="304" y1="66" x2="348" y2="90"/>
    <line x1="304" y1="66" x2="320" y2="116"/>
    <line x1="320" y1="116" x2="362" y2="140"/>
