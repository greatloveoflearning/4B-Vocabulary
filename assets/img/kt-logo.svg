<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 320" width="420" height="320">
  <g fill="none" stroke="#4f7d1f" stroke-width="7" stroke-linejoin="round" stroke-linecap="round">
    <!-- cloud/tree canopy outline on the left -->
    <path d="M95 165
             C60 165 48 130 70 108
             C62 82 88 60 115 68
             C122 40 165 32 182 58
             C210 50 235 75 222 105
             C240 118 235 150 205 155
             C195 172 160 175 145 160
             C130 172 108 175 95 165 Z"/>
    <!-- trunk of the K/circuit tree -->
    <line x1="165" y1="70" x2="165" y2="200"/>
    <!-- K letterform -->
    <line x1="165" y1="135" x2="205" y2="90"/>
    <line x1="172" y1="128" x2="212" y2="175"/>
    <!-- small circuit square to the left of the K -->
    <rect x="118" y="108" width="30" height="30"/>
    <line x1="133" y1="108" x2="133" y2="138"/>
    <line x1="118" y1="123" x2="148" y2="123"/>
  </g>

  <g fill="none" stroke="#1f3a1f" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
    <!-- pine tree triangle outline on the right -->
    <path d="M300 55 L355 165 L245 165 Z"/>
    <line x1="300" y1="165" x2="300" y2="210"/>
    <!-- small T trunk element -->
    <line x1="330" y1="125" x2="368" y2="125"/>
    <line x1="349" y1="125" x2="349" y2="200"/>
  </g>

  <!-- ground line -->
  <line x1="55" y1="207" x2="375" y2="207" stroke="#4f7d1f" stroke-width="4"/>

  <text x="210" y="255" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800"
        font-size="44" letter-spacing="4" fill="#4f7d1f">KT AI LEARN</text>
  <text x="210" y="285" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="600"
        font-size="18" letter-spacing="6" fill="#4f7d1f">ONLINE EDUCATION</text>
</svg>
