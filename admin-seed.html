<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin: Seed Typing Articles</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 20px; }
  button { font-size: 1rem; padding: 10px 20px; cursor: pointer; }
  input { font-size: 1rem; padding: 8px; margin-right: 8px; }
  #log { margin-top: 20px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; background: #f5f5f5; padding: 12px; border-radius: 6px; max-height: 400px; overflow-y: auto; }
  .warn { color: #b00; font-weight: bold; }
  .err { color: #b00; }
</style>
</head>
<body>
<h1>One-time: Seed Typing Articles to Firestore</h1>
<p class="warn">Admin-only tool. Sign in below with an admin account, then click the button once. Delete this page after use.</p>

<div id="login-box">
  <input type="email" id="login-email" placeholder="Admin email">
  <input type="password" id="login-password" placeholder="Password">
  <button id="login-btn">Sign in</button>
  <p class="err" id="login-err"></p>
</div>

<p>Signed in as: <span id="who">not signed in</span></p>
<button id="seed-btn" disabled>Seed 61 articles to Firestore</button>
<div id="log"></div>

<script src="assets/vendor/firebase-vendor.js"></script>
<script src="assets/firebase-config.js"></script>
<script src="assets/firebase-init.js"></script>
<script src="assets/typing-articles.js"></script>
<script>
(function () {
  const { auth, db, sdk } = window.vocabFirebase;
  const whoEl = document.getElementById("who");
  const btn = document.getElementById("seed-btn");
  const logEl = document.getElementById("log");
  const loginBox = document.getElementById("login-box");
  const loginBtn = document.getElementById("login-btn");
  const loginErr = document.getElementById("login-err");

  function log(msg) {
    logEl.textContent += msg + "\n";
    logEl.scrollTop = logEl.scrollHeight;
  }

  loginBtn.addEventListener("click", async () => {
    loginErr.textContent = "";
    const email = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    loginBtn.disabled = true;
    try {
      await sdk.signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      loginErr.textContent = e.code || e.message;
    } finally {
      loginBtn.disabled = false;
    }
  });

  sdk.onAuthStateChanged(auth, async (user) => {
    if (!user) {
      whoEl.textContent = "not signed in";
      btn.disabled = true;
      loginBox.hidden = false;
      return;
    }
    loginBox.hidden = true;
    whoEl.textContent = `${user.email} (uid: ${user.uid})`;
    try {
      const snap = await sdk.getDoc(sdk.doc(db, "users", user.uid));
      const isAdmin = snap.exists() && snap.data().isAdmin === true;
      if (!isAdmin) {
        whoEl.textContent += " — not an admin account, cannot seed.";
        btn.disabled = true;
        return;
      }
      btn.disabled = false;
    } catch (e) {
      whoEl.textContent += ` — couldn't verify admin status (${e.code || e.message})`;
      btn.disabled = true;
    }
  });

  btn.addEventListener("click", async () => {
    btn.disabled = true;
    const articles = window.TYPING_ARTICLES || [];
    log(`Found ${articles.length} articles to seed.`);
    const meta = [];
    let ok = 0;
    let failed = 0;
    for (const article of articles) {
      try {
        await sdk.setDoc(sdk.doc(db, "typingArticleContent", String(article.id)), {
          id: article.id,
          title: article.title,
          tokens: article.tokens,
        });
        meta.push({ id: article.id, title: article.title });
        ok++;
        log(`✓ #${article.id} ${article.title}`);
      } catch (e) {
        failed++;
        log(`✗ #${article.id} ${article.title} — ${e.code || e.message}`);
      }
    }
    try {
      await sdk.setDoc(sdk.doc(db, "typingArticlesMeta", "list"), { articles: meta });
      log(`\nWrote metadata list (${meta.length} entries).`);
    } catch (e) {
      log(`\n✗ Failed to write metadata list — ${e.code || e.message}`);
    }
    log(`\nDone. ${ok} succeeded, ${failed} failed.`);
    btn.disabled = false;
  });
})();
</script>
</body>
</html>
